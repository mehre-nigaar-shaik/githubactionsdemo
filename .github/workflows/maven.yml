name: Maven CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: mvn package

      - name: Run Unit Tests
        run: mvn test

      - name: Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar